<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sight Words 300 — 순간 인식 훈련</title>
<style>
  :root{
    --board: #1e3a2f;
    --board-dark: #16281f;
    --chalk: #f2efe4;
    --chalk-dim: #cfd6c8;
    --chalk-yellow: #e8c468;
    --chalk-pink: #e2867a;
    --chalk-blue: #8fb8c9;
    --rail: #6b4a35;
    --rail-dark: #4a3222;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, #2a4a3b 0%, var(--board) 45%, var(--board-dark) 100%);
    color: var(--chalk);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 18px 14px 40px;
    -webkit-font-smoothing: antialiased;
  }
  /* faint chalk dust texture */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; opacity:0.05;
    background-image: radial-gradient(circle at 20% 30%, white 0.5px, transparent 0.5px),
                       radial-gradient(circle at 70% 65%, white 0.5px, transparent 0.5px),
                       radial-gradient(circle at 40% 80%, white 0.5px, transparent 0.5px);
    background-size: 140px 140px, 180px 180px, 120px 120px;
  }
  header{
    width:100%; max-width:520px;
    text-align:center;
    padding: 10px 0 18px;
    border-bottom: 6px solid var(--rail);
    margin-bottom: 20px;
    position:relative;
  }
  header::after{
    content:"";
    position:absolute; left:-14px; right:-14px; bottom:-6px; height:10px;
    background: var(--rail-dark);
    border-radius: 0 0 4px 4px;
  }
  h1{
    font-family: "Segoe Print","Comic Sans MS",cursive;
    font-weight:700;
    font-size: 28px;
    letter-spacing: 0.5px;
    margin: 0 0 4px;
    color: var(--chalk);
    text-shadow: 0 0 1px rgba(242,239,228,0.3);
  }
  .subtitle{
    font-size: 13px;
    color: var(--chalk-dim);
    letter-spacing: 0.3px;
  }
  main{ width:100%; max-width:520px; flex:1; display:flex; flex-direction:column; }

  /* ===== Nav tabs ===== */
  nav{
    display:flex; gap:8px; margin-bottom:18px;
  }
  nav button{
    flex:1;
    background: transparent;
    border: 1.5px dashed rgba(242,239,228,0.35);
    color: var(--chalk-dim);
    padding: 10px 4px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    cursor:pointer;
    transition: all .15s ease;
  }
  nav button.active{
    color: var(--board-dark);
    background: var(--chalk-yellow);
    border-color: var(--chalk-yellow);
    font-weight:700;
  }

  .screen{ display:none; flex-direction:column; gap:16px; }
  .screen.active{ display:flex; }

  /* ===== Home / stats ===== */
  .stat-card{
    background: rgba(242,239,228,0.06);
    border: 1px solid rgba(242,239,228,0.15);
    border-radius: var(--radius);
    padding: 18px;
    text-align:center;
  }
  .stat-row{ display:flex; justify-content:space-around; margin-top:10px; }
  .stat-num{ font-size:26px; font-weight:800; color: var(--chalk-yellow); }
  .stat-label{ font-size:12px; color: var(--chalk-dim); margin-top:2px; }
  .group-grid{
    display:grid; grid-template-columns: repeat(3,1fr); gap:10px;
  }
  .group-btn{
    background: rgba(242,239,228,0.06);
    border: 1px solid rgba(242,239,228,0.18);
    color: var(--chalk);
    border-radius: 10px;
    padding: 14px 6px;
    text-align:center;
    cursor:pointer;
    font-family:inherit;
  }
  .group-btn .rng{ font-size:12px; color:var(--chalk-dim); display:block; margin-top:4px;}
  .group-btn .pct{ font-size:11px; color:var(--chalk-yellow); display:block; margin-top:6px; }

  /* ===== Flash mode ===== */
  .flash-wrap{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    flex:1; justify-content:center;
    min-height: 340px;
  }
  .flash-card{
    width:100%; max-width:380px;
    aspect-ratio: 3/2;
    background: rgba(0,0,0,0.15);
    border: 2px solid rgba(242,239,228,0.25);
    border-radius: var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 10px;
    position:relative;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
  }
  .flash-word{
    font-size: 44px;
    font-weight:800;
    letter-spacing: 0.5px;
    text-align:center;
    padding: 0 12px;
  }
  .flash-meaning{
    font-size: 18px;
    color: var(--chalk-blue);
    opacity:0;
    transition: opacity .2s ease;
  }
  .flash-meaning.show{ opacity:1; }
  .flash-progress{
    font-size:12px; color:var(--chalk-dim);
  }
  .flash-controls{
    display:flex; gap:10px; width:100%; max-width:380px;
  }
  .btn{
    flex:1;
    padding: 13px 10px;
    border-radius: 10px;
    border:none;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-know{ background: var(--chalk-blue); color: var(--board-dark); }
  .btn-unknow{ background: var(--chalk-pink); color: var(--board-dark); }
  .btn-speak{
    background: transparent; border: 1.5px solid rgba(242,239,228,0.4);
    color: var(--chalk); width:46px; flex:none; font-size:18px; border-radius:10px;
    padding: 13px 0;
  }
  .btn-nav{
    background: rgba(242,239,228,0.08); border: 1.5px solid rgba(242,239,228,0.25);
    color: var(--chalk); flex:1; font-size:18px; font-weight:700; border-radius:10px;
    padding: 13px 0; font-family:inherit; cursor:pointer;
  }
  .btn-nav:disabled{ opacity:0.3; cursor:default; }
  .speed-row{
    display:flex; align-items:center; gap:10px; justify-content:center; margin-top:4px;
    font-size:12px; color:var(--chalk-dim);
  }
  .speed-row select{
    background: rgba(242,239,228,0.08); color:var(--chalk); border:1px solid rgba(242,239,228,0.25);
    border-radius:6px; padding:4px 8px; font-family:inherit; font-size:12px;
  }

  /* ===== List mode ===== */
  .list-item{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 14px;
    background: rgba(242,239,228,0.05);
    border-bottom: 1px solid rgba(242,239,228,0.1);
    border-left: 4px solid transparent;
  }
  .list-item:first-child{ border-radius: 10px 10px 0 0; }
  .list-item:last-child{ border-radius: 0 0 10px 10px; border-bottom:none; }
  .list-item.status-known{ border-left-color: var(--chalk-blue); background: rgba(143,184,201,0.10); }
  .list-item.status-unknown{ border-left-color: var(--chalk-pink); background: rgba(226,134,122,0.08); }
  .list-rank{ font-size:11px; color: var(--chalk-dim); width:28px; }
  .list-word{ font-size:17px; font-weight:700; flex:1; }
  .list-item.status-known .list-word{ color: var(--chalk-blue); }
  .list-item.status-unknown .list-word{ color: var(--chalk-pink); }
  .list-status-icon{ width:20px; font-size:13px; text-align:center; flex:none; }
  .list-meaning{ font-size:13px; color: var(--chalk-blue); text-align:right; flex:1; }
  .back-link{
    background:none; border:none; color:var(--chalk-yellow); font-family:inherit;
    font-size:14px; cursor:pointer; text-align:left; padding:4px 0; margin-bottom:4px;
  }

  /* ===== Quiz mode ===== */
  .quiz-word{
    font-size: 38px; font-weight:800; text-align:center; margin: 10px 0 4px;
  }
  .quiz-options{ display:flex; flex-direction:column; gap:10px; }
  .quiz-opt{
    background: rgba(242,239,228,0.06);
    border: 1.5px solid rgba(242,239,228,0.2);
    color: var(--chalk);
    padding: 14px;
    border-radius: 10px;
    font-family:inherit; font-size:15px;
    text-align:left;
    cursor:pointer;
  }
  .quiz-opt.correct{ background: var(--chalk-blue); color:var(--board-dark); border-color:var(--chalk-blue); }
  .quiz-opt.wrong{ background: var(--chalk-pink); color:var(--board-dark); border-color:var(--chalk-pink); }
  .quiz-status{ text-align:center; font-size:13px; color:var(--chalk-dim); }

  .empty{ text-align:center; color:var(--chalk-dim); padding: 30px 10px; font-size:14px; }

  footer{
    margin-top: 24px; font-size:11px; color: rgba(242,239,228,0.35); text-align:center;
  }
</style>
</head>
<body>

<header>
  <h1>Sight Words 300</h1>
  <div class="subtitle">Fry 고빈도 단어 · 순간 인식 훈련</div>
</header>

<main>
  <nav>
    <button class="nav-btn active" data-screen="home">홈</button>
    <button class="nav-btn" data-screen="flash">순간인식</button>
    <button class="nav-btn" data-screen="list">목록</button>
    <button class="nav-btn" data-screen="quiz">퀴즈</button>
  </nav>

  <!-- HOME -->
  <section class="screen active" id="screen-home">
    <div class="stat-card">
      <div style="font-size:14px; color:var(--chalk-dim);">전체 진행률</div>
      <div class="stat-row">
        <div><div class="stat-num" id="stat-known">0</div><div class="stat-label">외운 단어</div></div>
        <div><div class="stat-num" id="stat-total">300</div><div class="stat-label">전체</div></div>
        <div><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">완료율</div></div>
      </div>
    </div>
    <div style="font-size:13px; color:var(--chalk-dim); padding: 0 2px;">
      그룹을 선택하면 해당 25개 단어로 순간인식 훈련을 시작해요.
    </div>
    <div class="group-grid" id="group-grid"></div>
  </section>

  <!-- FLASH -->
  <section class="screen" id="screen-flash">
    <button class="back-link" id="flash-back">← 그룹 다시 고르기</button>
    <div class="flash-wrap">
      <div class="flash-progress" id="flash-progress">1 / 25</div>
      <div class="flash-card" id="flash-card">
        <div class="flash-word" id="flash-word">the</div>
        <div class="flash-meaning" id="flash-meaning">그 (정관사)</div>
      </div>
      <div class="speed-row">
        노출 시간
        <select id="speed-select">
          <option value="600">0.6초 (빠름)</option>
          <option value="1000" selected>1.0초</option>
          <option value="1500">1.5초</option>
          <option value="0">수동(탭해서 확인)</option>
        </select>
      </div>
      <div class="flash-controls">
        <button class="btn-nav" id="flash-prev">◀</button>
        <button class="btn-speak" id="flash-speak">🔊</button>
        <button class="btn-nav" id="flash-next">▶</button>
      </div>
      <div class="flash-controls">
        <button class="btn btn-unknow" id="flash-unknow">모름</button>
        <button class="btn btn-know" id="flash-know">암기함</button>
      </div>
    </div>
  </section>

  <!-- LIST -->
  <section class="screen" id="screen-list">
    <button class="back-link" id="list-back">← 그룹 다시 고르기</button>
    <div id="list-container"></div>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="screen-quiz">
    <button class="back-link" id="quiz-back">← 그룹 다시 고르기</button>
    <div class="quiz-status" id="quiz-status">문제 1 / 10</div>
    <div class="quiz-word" id="quiz-word">the</div>
    <div class="quiz-options" id="quiz-options"></div>
  </section>
</main>

<footer>오프라인에서도 작동해요 · 진행 상황은 이 브라우저에 저장돼요</footer>

  document.getElementById('stat-pct').textContent = Math.round(totalKnown/WORDS.length*100)+'%';

  const grid = document.getElementById('group-grid');
  grid.innerHTML = '';
  GROUPS.forEach((g, idx)=>{
    const gk = g.filter(w=>known[w.id]).length;
    const div = document.createElement('div');
    div.className = 'group-btn';
    div.innerHTML = `그룹 ${idx+1}<span class="rng">${g[0].rank}-${g[g.length-1].rank}</span><span class="pct">${gk}/${g.length}</span>`;
    div.onclick = ()=>{
      currentGroup = g;
      currentGroupIndex = idx;
      startFlash();
      showScreen('flash');
    };
    grid.appendChild(div);
  });
}

// ===== Flash mode =====
let currentGroup = null;
let currentGroupIndex = 0;
let flashPos = 0;
let flashTimer = null;
let flashOrder = [];

function startFlash(){
  flashOrder = [...currentGroup];
  flashPos = 0;
  showFlashCard();
}
// ===== 음성(voice) 선택 =====
// 브라우저마다 탑재된 음성 품질이 다름. Google/Microsoft Natural 계열의
// 원격(non-local) 영어 음성이 로컬 기본 음성보다 훨씬 또렷하고 자연스러움.
let preferredVoice = null;
function pickBestVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;
  const enVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  const pool = enVoices.length ? enVoices : voices;
  const priorityNames = [
    'Aria',    // Microsoft Aria (Natural) - 문찬영님이 설치한 여성 음성
    'Jenny',   // Microsoft Jenny (Natural)
    'Ava',     // Microsoft Ava (Natural HD)
    'Google US English',
    'Andrew',  // Microsoft Andrew (Natural HD)
    'Guy',     // Microsoft Guy (Natural)
    'Samantha',
  ];
  for(const name of priorityNames){
    const found = pool.find(v => v.name.includes(name));
    if(found){ preferredVoice = found; return; }
  }
  // 이름 매칭 실패 시: 로컬 음성이 아닌(원격/고품질일 확률이 높은) en-US 음성 우선
  const remoteUS = pool.find(v => v.lang === 'en-US' && !v.localService);
  if(remoteUS){ preferredVoice = remoteUS; return; }
  const anyUS = pool.find(v => v.lang === 'en-US');
  preferredVoice = anyUS || pool[0];
}
if('speechSynthesis' in window){
  pickBestVoice();
  speechSynthesis.onvoiceschanged = pickBestVoice;
}

// 3글자 이하 짧은 기능어(to, a, of 등)는 문장 끝처럼 처리되지 않으면
// TTS 엔진이 끝소리를 뭉개는 경우가 많음(to→do처럼 들림).
// 마침표를 붙여 "문장이 끝나는 위치"로 인식시키면 조음이 훨씬 또렷해짐.
function speakWord(word){
  if(!('speechSynthesis' in window) || !word) return;
  const text = word.length <= 3 && /^[a-zA-Z']+$/.test(word) ? word + '.' : word;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if(preferredVoice) u.voice = preferredVoice;
  u.rate = 0.92;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
function showFlashCard(){
  clearTimeout(flashTimer);
  if(flashPos >= flashOrder.length){
    document.getElementById('flash-word').textContent = '완료! 🎉';
    document.getElementById('flash-meaning').textContent = '홈으로 돌아가 다른 그룹을 선택하세요';
    document.getElementById('flash-meaning').classList.add('show');
    document.getElementById('flash-progress').textContent = `${flashOrder.length} / ${flashOrder.length}`;
    document.getElementById('flash-prev').disabled = false;
    document.getElementById('flash-next').disabled = true;
    return;
  }
  updateNavButtons();
  const item = flashOrder[flashPos];
  document.getElementById('flash-progress').textContent = `${flashPos+1} / ${flashOrder.length}`;
  document.getElementById('flash-word').textContent = item.word;
  const meaningEl = document.getElementById('flash-meaning');
  meaningEl.textContent = item.meaning;
  meaningEl.classList.remove('show');
  speakWord(item.word);

  const speed = parseInt(document.getElementById('speed-select').value, 10);
  if(speed > 0){
    flashTimer = setTimeout(()=>{ meaningEl.classList.add('show'); }, speed);
  }
}
document.getElementById('flash-card').addEventListener('click', ()=>{
  document.getElementById('flash-meaning').classList.add('show');
});
document.getElementById('flash-speak').onclick = ()=>{
  const item = flashOrder[flashPos];
  if(item) speakWord(item.word);
};
function updateNavButtons(){
  const prevBtn = document.getElementById('flash-prev');
  const nextBtn = document.getElementById('flash-next');
  prevBtn.disabled = flashPos <= 0;
  nextBtn.disabled = flashPos >= flashOrder.length - 1;
}
// 화살표: 기록 없이 자유롭게 이동만
document.getElementById('flash-prev').onclick = ()=>{
  if(flashPos > 0){ flashPos--; showFlashCard(); }
};
document.getElementById('flash-next').onclick = ()=>{
  if(flashPos < flashOrder.length - 1){ flashPos++; showFlashCard(); }
};
// 암기함/모름: 기록 남기고 자동으로 다음 카드로 이동
function nextFlash(markKnown){
  const item = flashOrder[flashPos];
  if(item){
    known[item.id] = markKnown;
    saveKnown(known);
  }
  flashPos++;
  showFlashCard();
}
document.getElementById('flash-know').onclick = ()=>nextFlash(true);
document.getElementById('flash-unknow').onclick = ()=>nextFlash(false);

// ===== List mode =====
function renderList(){
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  if(!currentGroup){ container.innerHTML = '<div class="empty">홈에서 그룹을 선택해주세요</div>'; return; }
  currentGroup.forEach(item=>{
    const div = document.createElement('div');
    const status = known[item.id]; // true = 암기함, false = 모름, undefined = 미확인
    let statusClass = '';
    let icon = '';
    if(status === true){ statusClass = 'status-known'; icon = '✓'; }
    else if(status === false){ statusClass = 'status-unknown'; icon = '✕'; }
    div.className = 'list-item' + (statusClass ? ' ' + statusClass : '');
    div.innerHTML = `<span class="list-rank">${item.rank}</span><span class="list-status-icon">${icon}</span><span class="list-word">${item.word}</span><span class="list-meaning">${item.meaning}</span>`;
    div.onclick = ()=> speakWord(item.word);
    container.appendChild(div);
  });
}

// ===== Quiz mode =====
let quizQueue = [];
let quizPos = 0;
let quizScore = 0;

function startQuiz(){
  if(!currentGroup){ currentGroup = GROUPS[0]; currentGroupIndex = 0; }
  quizQueue = shuffle([...currentGroup]).slice(0, Math.min(10, currentGroup.length));
  quizPos = 0;
  quizScore = 0;
  showQuizQuestion();
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function showQuizQuestion(){
  if(quizPos >= quizQueue.length){
    document.getElementById('quiz-word').textContent = `${quizScore} / ${quizQueue.length} 정답!`;
    document.getElementById('quiz-status').textContent = '완료! 홈에서 다른 그룹을 선택해보세요';
    document.getElementById('quiz-options').innerHTML = '';
    return;
  }
  const item = quizQueue[quizPos];
  document.getElementById('quiz-status').textContent = `문제 ${quizPos+1} / ${quizQueue.length}`;
  document.getElementById('quiz-word').textContent = item.word;

  const wrongPool = WORDS.filter(w=>w.id!==item.id);
  const wrongs = shuffle(wrongPool).slice(0,3).map(w=>w.meaning);
  const options = shuffle([item.meaning, ...wrongs]);

  const optsEl = document.getElementById('quiz-options');
  optsEl.innerHTML = '';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = ()=>{
      const isCorrect = opt === item.meaning;
      document.querySelectorAll('.quiz-opt').forEach(b=>{
        b.onclick = null;
        if(b.textContent === item.meaning) b.classList.add('correct');
        else if(b===btn) b.classList.add('wrong');
      });
      known[item.id] = isCorrect;
      saveKnown(known);
      if(isCorrect) quizScore++;
      setTimeout(()=>{
        quizPos++;
        showQuizQuestion();
      }, 700);
    };
    optsEl.appendChild(btn);
  });
}

renderHome();
</script>
