<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>구동사 전치사별 — 문장 학습</title>
<style>
  :root{
    --board: #1e3a2f;
    --board-dark: #16281f;
    --chalk: #f2efe4;
    --chalk-dim: #cfd6c8;
    --chalk-yellow: #e8c468;
    --chalk-pink: #e2867a;
    --chalk-blue: #8fb8c9;
    --rail: #6b4a35;
    --rail-dark: #4a3222;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, #2a4a3b 0%, var(--board) 45%, var(--board-dark) 100%);
    color: var(--chalk);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 18px 14px 40px;
    -webkit-font-smoothing: antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; opacity:0.05;
    background-image: radial-gradient(circle at 20% 30%, white 0.5px, transparent 0.5px),
                       radial-gradient(circle at 70% 65%, white 0.5px, transparent 0.5px),
                       radial-gradient(circle at 40% 80%, white 0.5px, transparent 0.5px);
    background-size: 140px 140px, 180px 180px, 120px 120px;
  }
  header{
    width:100%; max-width:560px;
    text-align:center;
    padding: 10px 0 18px;
    border-bottom: 6px solid var(--rail);
    margin-bottom: 20px;
    position:relative;
  }
  header::after{
    content:"";
    position:absolute; left:-14px; right:-14px; bottom:-6px; height:10px;
    background: var(--rail-dark);
    border-radius: 0 0 4px 4px;
  }
  h1{
    font-family: "Segoe Print","Comic Sans MS",cursive;
    font-weight:700;
    font-size: 24px;
    letter-spacing: 0.5px;
    margin: 0 0 4px;
    color: var(--chalk);
  }
  .subtitle{ font-size: 13px; color: var(--chalk-dim); }
  main{ width:100%; max-width:560px; flex:1; display:flex; flex-direction:column; }

  nav{ display:flex; gap:8px; margin-bottom:18px; }
  nav button{
    flex:1; background: transparent; border: 1.5px dashed rgba(242,239,228,0.35);
    color: var(--chalk-dim); padding: 10px 4px; border-radius: 10px;
    font-size: 14px; font-family: inherit; cursor:pointer; transition: all .15s ease;
  }
  nav button.active{ color: var(--board-dark); background: var(--chalk-yellow); border-color: var(--chalk-yellow); font-weight:700; }

  .screen{ display:none; flex-direction:column; gap:16px; }
  .screen.active{ display:flex; }

  .stat-card{
    background: rgba(242,239,228,0.06); border: 1px solid rgba(242,239,228,0.15);
    border-radius: var(--radius); padding: 18px; text-align:center;
  }
  .stat-row{ display:flex; justify-content:space-around; margin-top:10px; }
  .stat-num{ font-size:26px; font-weight:800; color: var(--chalk-yellow); }
  .stat-label{ font-size:12px; color: var(--chalk-dim); margin-top:2px; }

  .chapter-list{ display:flex; flex-direction:column; gap:8px; }
  .chapter-btn{
    background: rgba(242,239,228,0.06); border: 1px solid rgba(242,239,228,0.18);
    color: var(--chalk); border-radius: 10px; padding: 12px 14px;
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
  }
  .chapter-btn .name{ font-size:15px; font-weight:700; }
  .chapter-btn .meta{ font-size:12px; color: var(--chalk-dim); }
  .chapter-btn .pct{ font-size:12px; color: var(--chalk-yellow); font-weight:700; min-width:60px; text-align:right; }

  .flash-wrap{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    flex:1; justify-content:center; min-height: 380px;
  }
  .flash-card{
    width:100%; max-width:420px; min-height:220px;
    background: rgba(0,0,0,0.15); border: 2px solid rgba(242,239,228,0.25);
    border-radius: var(--radius); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap: 14px; padding: 24px 18px;
    user-select:none; -webkit-tap-highlight-color: transparent;
  }
  .flash-eng{ font-size: 23px; font-weight:800; text-align:center; line-height:1.4; }
  .flash-kor{ font-size: 16px; color: var(--chalk-blue); text-align:center; line-height:1.5; opacity:0; transition: opacity .2s ease; }
  .flash-kor.show{ opacity:1; }
  .flash-progress{ font-size:12px; color:var(--chalk-dim); }
  .flash-controls{ display:flex; gap:10px; width:100%; max-width:420px; }
  .btn{ flex:1; padding: 13px 10px; border-radius: 10px; border:none; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-know{ background: var(--chalk-blue); color: var(--board-dark); }
  .btn-unknow{ background: var(--chalk-pink); color: var(--board-dark); }
  .btn-speak{ background: transparent; border: 1.5px solid rgba(242,239,228,0.4); color: var(--chalk); width:46px; flex:none; font-size:18px; border-radius:10px; padding: 13px 0; }
  .btn-nav{ background: rgba(242,239,228,0.08); border: 1.5px solid rgba(242,239,228,0.25); color: var(--chalk); flex:1; font-size:18px; font-weight:700; border-radius:10px; padding: 13px 0; font-family:inherit; cursor:pointer; }
  .btn-nav:disabled{ opacity:0.3; cursor:default; }
  .speed-row{ display:flex; align-items:center; gap:10px; justify-content:center; margin-top:4px; font-size:12px; color:var(--chalk-dim); }
  .speed-row select{ background: rgba(242,239,228,0.08); color:var(--chalk); border:1px solid rgba(242,239,228,0.25); border-radius:6px; padding:4px 8px; font-family:inherit; font-size:12px; }

  .list-item{
    display:flex; flex-direction:column; gap:4px; padding: 12px 14px;
    background: rgba(242,239,228,0.05); border-bottom: 1px solid rgba(242,239,228,0.1);
    border-left: 4px solid transparent;
  }
  .list-item:first-child{ border-radius: 10px 10px 0 0; }
  .list-item:last-child{ border-radius: 0 0 10px 10px; border-bottom:none; }
  .list-item.status-known{ border-left-color: var(--chalk-blue); background: rgba(143,184,201,0.10); }
  .list-item.status-unknown{ border-left-color: var(--chalk-pink); background: rgba(226,134,122,0.08); }
  .list-item-top{ display:flex; align-items:center; gap:8px; }
  .list-status-icon{ width:16px; font-size:12px; text-align:center; flex:none; }
  .list-eng{ font-size:15px; font-weight:700; flex:1; }
  .list-item.status-known .list-eng{ color: var(--chalk-blue); }
  .list-item.status-unknown .list-eng{ color: var(--chalk-pink); }
  .list-kor{ font-size:12px; color: var(--chalk-dim); padding-left:24px; }
  .back-link{ background:none; border:none; color:var(--chalk-yellow); font-family:inherit; font-size:14px; cursor:pointer; text-align:left; padding:4px 0; margin-bottom:4px; }

  .quiz-card{
    width:100%; max-width:420px; min-height:220px;
    background: rgba(0,0,0,0.15); border: 2px solid rgba(242,239,228,0.25);
    border-radius: var(--radius); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap: 14px; padding: 24px 18px;
    user-select:none; -webkit-tap-highlight-color: transparent;
  }
  .quiz-kor{ font-size: 20px; font-weight:800; text-align:center; line-height:1.5; }
  .quiz-eng-answer{ font-size: 17px; color: var(--chalk-blue); text-align:center; line-height:1.5; opacity:0; transition: opacity .2s ease; }
  .quiz-eng-answer.show{ opacity:1; }
  .quiz-hint{ font-size:12px; color: var(--chalk-dim); opacity:0.7; }
  .quiz-status{ text-align:center; font-size:13px; color:var(--chalk-dim); }
  .btn-pass{ background: var(--chalk-blue); color: var(--board-dark); }
  .btn-retry{ background: var(--chalk-pink); color: var(--board-dark); }

  .empty{ text-align:center; color:var(--chalk-dim); padding: 30px 10px; font-size:14px; }
  footer{ margin-top: 24px; font-size:11px; color: rgba(242,239,228,0.35); text-align:center; }
</style>
</head>
<body>

<header>
  <h1>구동사 전치사별</h1>
  <div class="subtitle">35개 챕터 · 3,073개 예문 · 문장 학습</div>
</header>

<main>
  <nav>
    <button class="nav-btn active" data-screen="home">홈</button>
    <button class="nav-btn" data-screen="flash">순간인식</button>
    <button class="nav-btn" data-screen="list">목록</button>
    <button class="nav-btn" data-screen="quiz">복습</button>
  </nav>

  <section class="screen active" id="screen-home">
    <div class="stat-card">
      <div style="font-size:14px; color:var(--chalk-dim);">전체 진행률</div>
      <div class="stat-row">
        <div><div class="stat-num" id="stat-known">0</div><div class="stat-label">암기한 문장</div></div>
        <div><div class="stat-num" id="stat-total">0</div><div class="stat-label">전체</div></div>
        <div><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">완료율</div></div>
      </div>
    </div>
    <div style="font-size:13px; color:var(--chalk-dim); padding: 0 2px;">
      챕터(전치사)를 선택하면 해당 문장들로 학습을 시작해요.
    </div>
    <div class="chapter-list" id="chapter-list"></div>
  </section>

  <section class="screen" id="screen-flash">
    <button class="back-link" id="flash-back">← 챕터 다시 고르기</button>
    <div class="flash-wrap">
      <div class="flash-progress" id="flash-progress">1 / 42</div>
      <div class="flash-card" id="flash-card">
        <div class="flash-eng" id="flash-eng">Leaves are scattered about the garden.</div>
        <div class="flash-kor" id="flash-kor">낙엽이 그 정원 주위에 흩어져 있다.</div>
      </div>
      <div class="speed-row">
        노출 시간
        <select id="speed-select">
          <option value="1500">1.5초</option>
          <option value="2500" selected>2.5초</option>
          <option value="4000">4초</option>
          <option value="0">수동(탭해서 확인)</option>
        </select>
      </div>
      <div class="flash-controls">
        <button class="btn-nav" id="flash-prev">◀</button>
        <button class="btn-speak" id="flash-speak">🔊</button>
        <button class="btn-nav" id="flash-next">▶</button>
      </div>
      <div class="flash-controls">
        <button class="btn btn-unknow" id="flash-unknow">모름</button>
        <button class="btn btn-know" id="flash-know">암기함</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screen-list">
    <button class="back-link" id="list-back">← 챕터 다시 고르기</button>
    <div id="list-container"></div>
  </section>

  <section class="screen" id="screen-quiz">
    <button class="back-link" id="quiz-back">← 챕터 다시 고르기</button>
    <div class="quiz-status" id="quiz-status">1 / 42</div>
    <div class="quiz-card" id="quiz-card">
      <div class="quiz-kor" id="quiz-kor">낙엽이 그 정원 주위에 흩어져 있다.</div>
      <div class="quiz-eng-answer" id="quiz-eng-answer">Leaves are scattered about the garden.</div>
      <div class="quiz-hint" id="quiz-hint">탭해서 정답 확인</div>
    </div>
    <div class="flash-controls">
      <button class="btn-nav" id="quiz-prev">◀</button>
      <button class="btn-speak" id="quiz-speak">🔊</button>
      <button class="btn-nav" id="quiz-next">▶</button>
    </div>
    <div class="flash-controls">
      <button class="btn btn-retry" id="quiz-retry">다시 학습</button>
      <button class="btn btn-pass" id="quiz-pass">통과</button>
    </div>
  </section>
</main>

<footer>오프라인에서도 작동해요 · 진행 상황은 이 브라우저에 저장돼요</footer>

<script>
const CHAPTERS = [{"title": "Chapter 01. About", "items": [{"id": "0001", "group": "1", "kor": "낙엽이 그 정원 주위에 흩어져 있다.", "eng": "Leaves are scattered about the garden."}, {"id": "0002", "group": "1", "kor": "책들이 그 방 이곳저곳에 놓여 있다.", "eng": "Books are lying about the room."}, {"id": "0003", "group": "2", "kor": "그는 오전 8시경에 도착했다.", "eng": "He arrived at about  8:00  in the morning."}, {"id": "0004", "group": "2", "kor": "그 사고는 9시쯤 발생했다.", "eng": "The accident occurred at about 9."}, {"id": "0005", "group": "3", "kor": "그는 그의 중국여행의 이것저것에 대해 연설을 했다.", "eng": "He spoke about his trip to China."}, {"id": "0006", "group": "3", "kor": "우리는 은퇴에 대해서 이것저것 이야기했다.", "eng": "We talked about retirement."}, {"id": "0007", "group": "3", "kor": "그녀는 그녀의 친구에 대해서 이것저것 물어보았다.", "eng": "She asked about her friend."}, {"id": "0008", "group": "4", "kor": "나는 나의 할머니에 대해서 항상 이것저것 생각한다.", "eng": "I always think about my grandmother."}, {"id": "0009", "group": "4", "kor": "나는 캐나다의 이것저것에 대해서 읽었다.", "eng": "I read about Canada."}, {"id": "0010", "group": "4", "kor": "나는 그 결과에 대해서 어제 알았다.", "eng": "I learned about the result yesterday."}, {"id": "0011", "group": "4", "kor": "나는 그 학교에 대해서 안다.", "eng": "I know about the school."}, {"id": "0012", "group": "5", "kor": "나에 대해서 신경 쓰지 마세요.", "eng": "Don't bother about me."}, {"id": "0013", "group": "5", "kor": "그가 관심을 갖는 모든 것은 돈이다.", "eng": "All he cares about is money."}, {"id": "0014", "group": "5", "kor": "그는 언제나 자신의 시험에 대해서 초조해한다.", "eng": "He always frets about his test."}, {"id": "0015", "group": "5", "kor": "그는 그녀의 죽음에 대해서 슬퍼한다.", "eng": "He grieves about her death."}, {"id": "0016", "group": "5", "kor": "그는 그의 건강에 대해서 걱정한다.", "eng": "He worries about his health."}, {"id": "0017", "group": "6", "kor": "그 기술이 많은 일자리를 생겨나게 했다.", "eng": "The technology has brought about many jobs."}, {"id": "0018", "group": "6", "kor": "나는 그 상황이 어떻게 생겼는지 이해할 수 없다.", "eng": "I don't understand how the situation came about."}, {"id": "0019", "group": "7", "kor": "그는 매일 하는 nt to Canada by plane."}, {"id": "0576", "group": "9", "kor": "그는 새 고속도로/지방도로로 광주에 내려갔다.", "eng": "He went down to Gwangju by the new highway/a local road."}, {"id": "0577", "group": "10", "kor": "그는 비행기를 타고 캐나다로 갔다.", "eng": "He went to Canada on the plane."}, {"id": "0578", "group": "10", "kor": "그는 비행기 편으로 캐나다에 갔다.", "eng": "He went to Canada by plane."}, {"id": "0579", "group": "10", "kor": "그는 기차를 타고 부산에 내려왔다.", "eng": "He came down to Busan on the train."}, {"id": "0580", "group": "10", "kor": "그는 기차 편으로 부산에 내려왔다.", "eng": "He came down to Busan by train."}, {"id": "0581", "group": "11", "kor": "그들은 시간 단위로 요금을 징수했다.", "eng": "They charged by the hour."}, {"id": "0582", "group": "11", "kor": "그는 월 단위로 돈이 지급된다.", "eng": "He is paid by the month."}, {"id": "0583", "group": "12", "kor": "그 배는 12개 단위로 팔린다.", "eng": "The pears are sold by the dozen."}, {"id": "0584", "group": "12", "kor": "그 밀가루는 파운드 단위로 팔린다.", "eng": "The flour is sold by the pound."}, {"id": "0585", "group": "13", "kor": "그들은 3대 1로 이겼다. 즉, 그 경기는 2점 차이로 이겼다.", "eng": "They won the game three to one. That is, the game is won by two points."}, {"id": "0586", "group": "13", "kor": "물가가 20% 차로 올랐다.", "eng": "Prices jumped up by 20%."}, {"id": "0587", "group": "13", "kor": "그는 간발의 차로 도망갔다.", "eng": "He escaped by a hair's breadth."}, {"id": "0588", "group": "13", "kor": "그는 큰 표차로 그 선거에서 이겼다.", "eng": "He won the election by a large margin."}, {"id": "0589", "group": "14", "kor": "메리는 2센티미터 차이로 수잔보다 키가 더 크다.", "eng": "Mary is taller than Susan by two centimeters."}, {"id": "0590", "group": "14", "kor": "그는 30분 차이로 일렀다.", "eng": "He was early by  30 minutes."}, {"id": "0591", "group": "14", "kor": "그는 30분 차이로 늦었다.", "eng": "He was late by  30 minutes."}, {"id": "0592", "group": "14", "kor": "그는 큰 차이로 최고의 선수이다.", "eng": "He is by far the best player."}, {"id": "0593", "group": "14", "kor": "그는 나보다 두 살 아래이다.", "eng": "He is junior to me by 2 years."}, {"id": "0594", "group": "15", "kor": "6을 3으로 곱해라.", "eng": "Multiply  6 by 3 ."}, {"id": "0595", "group": "15", "kor": "그 12를 3으로 나누어라.", "eng": "Divide the number  12 by 3."}, {"id": "0596", "group": "16", "kor": "그 창문은 면적이 5미터×3미터이다.", "eng": "The window measures 5m by 3m."}, {"id": "0597", "group": "16", "kor": "그 방은 면적이 10미터X20미터이다.", "eng": "The room measures 10m by 20m."}, {"id": "0598", "group": "16", "kor": "그 호수는 길이 100마일에 너비 50마일이다.", "eng": "The lake is  100 miles long by 50 miles wide."}, {"id": "0599", "group": "16", "kor": "그 식탁은 길이 20피트에 너비 10피트이다.", "eng": "The table is  20 feet long by  10 feet wide."}, {"id": "0600", "group": "17", "kor": "그는 그 토끼를 목덜미로 잡았다.", "eng": "He caught the rabbit by the neck."}, {"id": "0601", "group": "17", "kor": "그 어미 사자는 새끼 사자를 목덜미를 잡고 이동했다.", "eng": "The mom lion carried her cub by the scruff."}, {"id": "0602", "group": "17", "kor": "그 코치는 그 선수를 어깨로 잡았다.", "eng": "The coach held the player by the shoulder."}, {"id": "0603", "group": "17", "kor": "그 경찰이 그 강도를 목에 힘을 가하며 잡았다.", "eng": "The police grabbed the robber by the throat."}, {"id": "0604", "group": "17", "kor": "그는 그 젖은 종이 한 귀퉁이를 잡고 들고 있었다.", "eng": "He held up the wet sheet of paper by one corner."}, {"id": "0605", "group": "17", "kor": "뒷다리로", "eng": "by the hinding leg"}, {"id": "0606", "group": "17", "kor": "꼬리로", "eng": "by the tail"}, {"id": "0607", "group": "18", "kor": "그는 인사도 없이 내 곁을 지나갔다.", "eng": "He went by me without saying hello."}, {"id": "0608", "group": "18", "kor": "그녀는 날 보지 않고 내 곁을 지나갔다.", "eng": "She passed by me without looking at me."}, {"id": "0609", "group": "18", "kor": "학교 가는 길에 그는 잠깐 편의점에 들렀다.", "eng": "On his way to school, he stopped by a convenience store."}, {"id": "0610", "group": "18", "kor": "우리는 그 가게 곁을 지나갔다.", "eng": "We walked by the store."}, {"id": "0611", "group": "19", "kor": "나는 그 일을 마감일 전에 마쳤다.", "eng": "I finished the job by the deadline."}, {"id": "0612", "group": "19", "kor": "그는 그 책을 반납일에 돌려주었다.", "eng": "He returned the book by the due date."}, {"id": "0613", "group": "20", "kor": "여러분은 금요일까지 떠나야 합니다.", "eng": "You must leave by Friday."}, {"id": "0614", "group": "20", "kor": "6시까지 일어나야 한다.", "eng": "You must get up by 6."}, {"id": "0615", "group": "20", "kor": "나는 이 책을 6월 말까지 내야만 한다.", "eng": "I have to get this book out by the end of June."}, {"id": "0616", "group": "21", "kor": "그는 (그 경기 곁에 서서) 그 경기를 관람했다.", "eng": "He stood by and watched the game."}, {"id": "0617", "group": "21", "kor": "이것은 내 집이고, 그의 집은 (내 집의) 곁에 가까이 있다.", "eng": "This is my house, and his house is near by."}, {"id": "0618", "group": "21", "kor": "나는 집에 가는 길에 너에게 들러서 너를 보겠다.", "eng": "I will come by and see you on my way home."}, {"id": "0619", "group": "21", "kor": "그 승무원들은 명령받을 준비를 하고 (명령을 받는 위치에) 대기하고 있다.", "eng": "The crew members are standing by, ready to take order."}, {"id": "0620", "group": "22", "kor": "20년이 (내 곁을) 지나갔다.", "eng": "Twenty years went by."}, {"id": "0621", "group": "22", "kor": "트럭 한 대가 시끄러운 소리를 내며 (내 곁을) 지나갔다.", "eng": "A truck went by with a loud noise."}, {"id": "0622", "group": "22", "kor": "차들이 한쪽으로 서고, 구급차가 (그 곁을) 지나갔다.", "eng": "Cars pulled over, and the ambulance passed by."}, {"id": "0623", "group": "22", "kor": "당신이 (내 곁을) 지나가면 와서 나를 보고 가세요.", "eng": "Come and see me if you pass by."}, {"id": "0624", "group": "23", "kor": "우리 부모님은 근처에 사신다.", "eng": "Our parents live close by."}, {"id": "0625", "group": "23", "kor": "그 고속도로는 마을 근처를 지나간다.", "eng": "The highway passes close by the town."}, {"id": "0626", "group": "23", "kor": "항상 너의 사전을 가까이 지니고 있어라.", "eng": "Always have your dictionary near by."}, {"id": "0627", "group": "23", "kor": "톰이 근처에 앉았다.", "eng": "Tom sat nearby."}]}, {"title": "Chapter 12. Down", "items": [{"id": "0628", "group": "1", "kor": "그 물이 그 계곡을 따라 흘러 내려갔다.", "eng": "The water flowed down the valley."}, {"id": "0629", "group": "1", "kor": "그 원숭이가 그 나무 아래로 기어 내려갔다.", "eng": "The monkey climbed down the tree."}, {"id": "0630", "group": "1", "kor": "그는 그 경사로를 따라 운전해 내려갔다.", "eng": "He drove down the ramp."}, {"id": "0631", "group": "1", "kor": "그는 그 계단 아래로 내려갔다.", "eng": "He went down the stairs."}, {"id": "0632", "group": "1", "kor": "그는 그 벼랑 아래로 뛰어내렸다.", "eng": "He jumped down the cliff."}, {"id": "0633", "group": "2", "kor": "나는 그 아이를 밀어 그 미끄럼틀을 타고 내려가게 했다.", "eng": "I pushed the child down the slide."}, {"id": "0634", "group": "2", "kor": "그 구조원들이 그 부상당한 사람을 그 사다리 아래로 옮겼다.", "eng": "The rescuers carried the wounded man down the ladder."}, {"id": "0635", "group": "2", "kor": "그녀는 물을 쏟아 그 배수관을 따라 내려가게 했다.", "eng": "She poured water down the drain."}, {"id": "0636", "group": "2", "kor": "그들은 통나무를 굴려서 산을 따라 내려가게 했다.", "eng": "They rolled logs down the hillside."}, {"id": "0637", "group": "3", "kor": "그 경찰서는 이 길을 쭉 따라 내려간 곳에 있다.", "eng": "The police station is down this road."}, {"id": "0638", "group": "3", "kor": "그들은 언덕 아래에 살고 있다.", "eng": "They live down the hill."}, {"id": "0639", "group": "4", "kor": "그 비행기가 내려갔다. (즉, 추락했다)", "eng": "The plane went down."}, {"id": "0640", "group": "4", "kor": "비가 세차게 내리치고 있다.", "eng": "The rain is lashing down."}, {"id": "0641", "group": "4", "kor": "해가 내리쬐고 있다.", "eng": "The sun is beating down."}, {"id": "0642", "group": "4", "kor": "그 배는 바닥까지 가라앉았다.", "eng": "The ship sank down to the bottom."}, {"id": "0643", "group": "5", "kor": "그 조종사가 그 비행기를 착륙시켰다.", "eng": "The pilot brought down the plane."}, {"id": "0644", "group": "5", "kor": "그는 그 비행기를 내렸다. (즉, 비행기를 착륙시켰다.)", "eng": "He put down his plane."}, {"id": "0645", "group": "5", "kor": "그 사냥꾼이 그 독수리를 쏴서 내렸다.", "eng": "The hunter shot down the eagle."}, {"id": "0646", "group": "6", "kor": "그는 의자에 앉았다.", "eng": "He sat down on a chair."}, {"id": "0647", "group": "6", "kor": "그는 마루에 드러누웠다.", "eng": "He lay down on the floor."}, {"id": "0648", "group": "6", "kor": "그는 무릎을 꿇고 앉았다.", "eng": "He kneeled down."}, {"id": "0649", "group": "6", "kor": "그는 무릎을 대고 앉았다.", "eng": "He went down on his knees."}, {"id": "0650", "group": "6", "kor": "그는 웅크리고 앉았다.", "eng": "He crouched down."}, {"id": "0651", "group": "7", "kor": "그 반군들이 시민들을 땅에 엎드리게 했다.", "eng": "The rebels laid down the civilians."}, {"id": "0652", "group": "8", "kor": "그는 넘어졌다.", "eng": "He fell down."}, {"id": "0653", "group": "8", "kor": "그 나무가 그 폭풍에 쓰러졌다.", "eng": "The tree fell down in the storm."}, {"id": "0654", "group": "9", "kor": "사자떼 한 무리가 하마를 쓰러뜨렸다.", "eng": "A pack of lions brought a hippo down."}, {"id": "0655", "group": "9", "kor": "그는 나무를 베어 쓰러뜨렸다.", "eng": "He cut down the tree."}, {"id": "0656", "group": "9", "kor": "그는 나를 쳐서 넘어뜨렸다.", "eng": "He knocked me down."}, {"id": "0657", "group": "9", "kor": "그 차가 그를 넘어뜨렸다.", "eng": "The car ran him down."}, {"id": "0658", "group": "9", "kor": "그는 택시에 치어서 넘어졌다.", "eng": "He was run down by a taxi."}, {"id": "0659", "group": "10", "kor": "그 건물은 타서 없어졌다.", "eng": "The building burned down."}, {"id": "0660", "group": "10", "kor": "베를린 장벽은 25년 전 무너졌다.", "eng": "The Berlin Wall came down 25 years ago."}, {"id": "0661", "group": "10", "kor": "그 집이 불타서 없어졌다.", "eng": "The house went down in flames."}, {"id": "0662", "group": "11", "kor": "그들은 그 벽을 허물어뜨렸다.", "eng": "They broke down the wall."}, {"id": "0663", "group": "11", "kor": "그는 그 울타리를 뜯어서 없앴다.", "eng": "He tore down the fence."}, {"id": "0664", "group": "11", "kor": "그들은 고가도로를 당겨서 끌어내렸다. (즉, 허물었다.)", "eng": "They pulled down the overpass."}, {"id": "0665", "group": "12", "kor": "그는 맥주 두 캔을 급히 들이켰다.", "eng": "He bolted down 2 cans of beer."}, {"id": "0666", "group": "12", "kor": "그는 물 한 잔을 벌컥 들이마셨다.", "eng": "He gulped down a glass of water."}, {"id": "0667", "group": "12", "kor": "그는 큰 고기 덩어리 하나를 힘겹게 삼켰다.", "eng": "He choked down a big chunk of meat."}, {"id": "0668", "group": "12", "kor": "그 아이가 쿠키를 재빨리 삼켰다.", "eng": "The child gobbled down cookies."}, {"id": "0669", "group": "12", "kor": "그는 병에서 알약을 두 개 꺼내서 그것을 꿀꺽 삼켜 내렸다.", "eng": "He took two pills out of the bottle and swallowed them down."}, {"id": "0670", "group": "13", "kor": "그는 호스로 벽을 씻어 내렸다.", "eng": "He hosed down the wall."} ng": "He's feeling down."}, {"id": "0691", "group": "18", "kor": "그는 감기로 병이 났다.", "eng": "He came down with a cold."}, {"id": "0692", "group": "19", "kor": "그 실패가 그를 의기소침하게 만들었다.", "eng": "The failure brought him down."}, {"id": "0693", "group": "19", "kor": "그 소식이 그를 낙담하게 만들었다.", "eng": "The news put him down."}, {"id": "0694", "group": "19", "kor": "내 컴퓨터가 나를 다시 실망시켰다.", "eng": "The computer let me down again."}, {"id": "0695", "group": "19", "kor": "그 새로운 스마트폰은 당신을 실망시키지 않을 것이다.", "eng": "The new smartphone won't let you down."}, {"id": "0696", "group": "20", "kor": "그 말이 먼지를 일으켰다.", "eng": "The horse kicked up dust."}, {"id": "0697", "group": "20", "kor": "그 먼지가 가라앉고 있다.", "eng": "The dust is settling down."}, {"id": "0698", "group": "21", "kor": "마음을 가라앉히고 일에 전념을 할 때이다.", "eng": "It's time to buckle down."}, {"id": "0699", "group": "21", "kor": "그는 마음을 차분히 가라앉히고 일을 시작했다.", "eng": "He got down to work."}, {"id": "0700", "group": "21", "kor": "나는 마음을 가라앉히고 본격적으로 진지한 연구를 시작할 것이다.", "eng": "I am going to knuckle down to serious studying."}, {"id": "0701", "group": "21", "kor": "마음을 가라앉히고 무슨 일이 일어났는지 말해다오.", "eng": "Calm down and tell me what happened."}, {"id": "0702", "group": "21", "kor": "그날의 흥분을 겪고 나서 마음을 가라앉히고 일하기는 어렵다.", "eng": "It is hard to settle down and work after the day's excitement."}, {"id": "0703", "group": "22", "kor": "그는 나를 심하게 꾸짖었다.", "eng": "He came down hard on me."}, {"id": "0704", "group": "22", "kor": "우리에게 얕보는 투로 말하지 마세요.", "eng": "Please don't talk down to us."}, {"id": "0705", "group": "22", "kor": "그는 항상 가난한 사람들을 얕보았다.", "eng": "He always looked down upon the poor."}, {"id": "0706", "group": "23", "kor": "그는 내가 술을 너무 많이 마신다고 야단쳤다.", "eng": "He called me down for drinking too much."}, {"id": "0707", "group": "23", "kor": "내 친구들 앞에서 나를 망신 주지 마세요.", "eng": "Don't put me down in front of my friends."}, {"id": "0708", "group": "23", "kor": "나를 이렇게 비판하지 말아 주세요. 나는 그렇게 나쁘진 않아요.", "eng": "Please don't run me down like this. I'm not that bad."},  있다.", "eng": "People are squeezing into the train."}, {"id": "1105", "group": "43", "kor": "그 열차가 도착하자 사람들이 그 열차 안으로 비집고 들어가고 있다.", "eng": "The train has arrived and people are squeezing in."}, {"id": "1106", "group": "44", "kor": "그 고용인은 아프다고 (회사에) 전화를 걸어왔다.", "eng": "The employee called in sick this morning."}, {"id": "1107", "group": "44", "kor": "그는 (상부에) 승진요청서를 들여보냈다.", "eng": "He put in a request for rise."}, {"id": "1108", "group": "44", "kor": "그 기자가 바그다드로부터 기사를 (본부로) 보내왔다.", "eng": "The reporter reported in from Baghdad."}, {"id": "1109", "group": "44", "kor": "전달할 말을 게시판에 올리거나 (방송국에) 문자로 보내주세요.", "eng": "Put up your message on the bulletin board or text in."}, {"id": "1110", "group": "44", "kor": "당신의 개 사진을 (방송국에) 보내주세요.", "eng": "Please send in a photo of your dog."}, {"id": "1111", "group": "45", "kor": "그는 데이터를 입력해서 (컴퓨터에) 넣었다.", "eng": "He keyed in the data."}, {"id": "1112", "group": "45", "kor": "그는 개인 식별번호를 넣었다.", "eng": "He punched in his PIN."}, {"id": "1113", "group": "45", "kor": "그는 그의 비밀번호로 로그인했다.", "eng": "He logged in with his password."}, {"id": "1114", "group": "45", "kor": "그는 그의 비밀번호로 로그인했다.", "eng": "He signed in with his password."}, {"id": "1115", "group": "46", "kor": "그들은 그 잠수원을 (어디로) 끌어들였다.", "eng": "They hauled in the diver."}, {"id": "1116", "group": "46", "kor": "그 피난민들은 몸을 (안으로) 던져들었다.", "eng": "The refugees hurled themselves in."}, {"id": "1117", "group": "47", "kor": "누가 우리 뒤에 차를 세워 우리가 갇혔다.", "eng": "Someone had parked behind us and boxed us in."}, {"id": "1118", "group": "47", "kor": "그 경비원이 문을 잠가 그녀를 가두고 가 버렸다.", "eng": "The guard locked her in and went away."}, {"id": "1119", "group": "47", "kor": "우리 이웃은 그의 정원을 울타리로 둘러쌌다.", "eng": "Our neighbor fenced in his yard."}, {"id": "1120", "group": "47", "kor": "적이 완전히 포위되었다.", "eng": "The enemies are hemmed in."}, {"id": "1121", "group": "47", "kor": "그는 집을 담으로 둘러쌌다.", "eng": "He walled in the house."}, {"id": "1122", "group": "47", "kor": "집에 오는 길에 우리는 눈에 묻혀 꼼짝할 수 없었다.", "eng": "On our way home, we got snowed in."}, {"id": "1123", "group": "47", "kor": "그 쥐가 덫 안에 갇혀 있다.", "eng": "The mouse was trapped in."}, {"id": "1124", "group": "47", "kor": "내 차는 큰 트럭 때문에 꼼짝없이 갇혔다.", "eng": "My car was blocked in by a truck."}, {"id": "1125", "group": "47", "kor": "모든 승객들이 이륙 전 끈을 매고 안전한 상태에 있었다.", "eng": "All the passengers were strapped in before take-off."}, {"id": "1126", "group": "48", "kor": "낮 길이가 줄어들고 있다.", "eng": "Days are closing in."}, {"id": "1127", "group": "48", "kor": "밤이 점점 짧아지고 있다.", "eng": "Nights are drawingin."}, {"id": "1128", "group": "48", "kor": "그녀는 바지를 줄였다.", "eng": "She took her pants in."}, {"id": "1129", "group": "48", "kor": "그녀는 스커트를 잘라서 줄였다.", "eng": "She cuts her skirt in."}, {"id": "1130", "group": "49", "kor": "그 아이는 그가 그린 도형에 색칠했다.", "eng": "The child colored in the figures he had drawn."}, {"id": "1131", "group": "49", "kor": "나는 지원서를 기입했다.", "eng": "I filled in the application form."}, {"id": "1132", "group": "49", "kor": "그녀는 수표에 이름, 액수 등을) 기입해 넣었다.", "eng": "She wrote in her check."}, {"id": "1133", "group": "49", "kor": "나는 국기의 밑 부분에 잉크를 칠했다.", "eng": "I inked in the bottom part of a flag."}, {"id": "1134", "group": "49", "kor": "그는 바탕에 몇몇 언덕을 그려 넣었다.", "eng": "He sketched in some hills in the background."}, {"id": "1135", "group": "49", "kor": "그녀는 연못을 그리고 푸른색을 칠했다.", "eng": "She drew a pond and blocked in the blue color."}, {"id": "1136", "group": "50", "kor": "그 지붕이 내려앉았다.", "eng": "The roof gave in."}, {"id": "1137", "group": "50", "kor": "우리는 그들의 요구에 굴복했다.", "eng": "We gave in to their demand."}, {"id": "1138", "group": "50", "kor": "그 완충기가 움푹 들어갔다.", "eng": "The bumper got dented in."}, {"id": "1139", "group": "50", "kor": "누군가가 내 모자를 밟아서, 그것이 쭈그러들었다.", "eng": "Someone stepped on my hat, and it squashed in."}, {"id": "1140", "group": "50", "kor": "그녀가 그 스카프를 물에 빨자, 그것이 오그라들었다.", "eng": "As she washed the scarf in water, it all shrank in."}, {"id": "1141", "group": "51", "kor": "그 물고기는 먹이를 (몸속으로) 마구 빨아들였다.", "eng": "The fish sucked in prey."}, {"id": "1142", "group": "51", "kor": "그 약의 효과가 (먹은 사람의 몸속에) 들어갔다.", "eng": "The effect of the drug kicked in."}, {"id": "1143", "group": "51", "kor": "그 영화는 많은 돈을 벌어들였다.", "eng": "The film brought in lots of money."}, {"id": "1144", "group": "51", "kor": "그들은 그 시골의 멋진 풍경을 받아들였다. (즉, 감상했다.)", "eng": "They took in a great view of the countryside."}, {"id": "1145", "group": "51", "kor": "그는 월 1,000달러 정도를 번다.", "eng": "He pulls in about 1,000 dollars a month."}, {"id": "1146", "group": "51", "kor": "몇몇 EU 국가들은 피난민들을 받아들이기를 주저한다.", "eng": "Some EU countries are hesitant to take in refugees."}, {"id": "1147", "group": "52", "kor": "그 강아지가 개집에서 나오려고 했으나 나는 그를 집어넣었다.", "eng": "The puppy was trying to get out of his kennel but I pushed him in."}, {"id": "1148", "group": "52", "kor": "그 소가 나가려고 했으나 나는 그 소를 잡아당겨 들였다.", "eng": "The cow was trying to go out but I pulled her in."}, {"id": "1149", "group": "53", "kor": "내가 대답하려고 하는 동안 그 면접관이 불쑥 끼어들었다.", "eng": "The interviewer butted in while I was trying to answer."}, {"id": "1150", "group": "53", "kor": "나는 내가 말할 때 그녀가 끼어드는 것을 좋아하지 않는다.", "eng": "I don't like her cutting in on me."}, {"id": "1151", "group": "53", "kor": "모두 누가 지도자가 될 것인가에 대해서 각자의 제안을 가지고 (토론에) 참여했다.", "eng": "Everyone weighed in with their own suggestions of who should be the leader."}, {"id": "1152", "group": "53", "kor": "우리는 그의 선물로 좋은 것을 사기 위해 돈을 각출했다.", "eng": "We all chipped in to get something nice for his present."}, {"id": "1153", "group": "53", "kor": "모두들 시간 맞춰 그 일을 끝내기 위해 밤낮으로 협력했다.", "eng": "Everyone pitched in, working day and night to get the job done in time."}, {"id": "1154", "group": "54", "kor": "나는 첫 학기는 (기숙사 등에서) 살 것이다.", "eng": "I am going to live in for the first semester."}, {"id": "1155", "group": "54", "kor": "그 도우미는 입주해 있다.", "eng": "The maid lives in."}, {"id": "1156", "group": "54", "kor": "나는 오늘밤 집에 머물면서 축구 경기를 시청하고 싶다.", "eng": "I'd like to stay in tonight and watch the football game."}, {"id": "1157", "group": "54", "kor": "우리는 오늘 집에서 만찬할 예정이다.", "eng": "We are going to dine in today."}, {"id": "1158", "group": "54", "kor": "우리는 오늘 집에서 식사할 예정이다.", "eng": "We are going to eat in today."}, {"id": "1159", "group": "55", "kor": "시원한 바람이 그 바다로부터 불어오고 있다.", "eng": "Cool wind is blowing in from the ocean."}, {"id": "1160", "group": "55", "kor": "모든 종류의 생선들이 전국에서 들어온다.", "eng": "All kinds of fish are brought in from all over the country."}, {"id": "1161", "group": "55", "kor": "그는 시골에서 이사해 들어왔다.", "eng": "He moved in from the countryside."}, {"id": "1162", "group": "55", "kor": "그 태풍이 바다로부터 불어 들어오고 있다.", "eng": "The storm is rolling in from the ocean."}, {"id": "1163", "group": "55", "kor": "그는 부산에서 이사를 해서 (이곳에) 들어왔다.", "eng": "He moved in from Busan."}, {"id": "1164", "group": "56", "kor": "경찰이 범위를 좁혀 들어가서 그 범인을 잡았다.", "eng": "Police closed in on the criminal."}, {"id": "1165", "group": "56", "kor": "그 조종사가 범위를 좁혀 들어가서 그 목표에 명중했다.", "eng": "The pilot zeroed in on the target."}, {"id": "1166", "group": "56", "kor": "그는 (대화에 몰래 끼어들어서) 내 말을 들었다.  (즉, 도청했다.)", "eng": "He listened in on me."}, {"id": "1167", "group": "56", "kor": "그는 (내가 다른 사람과 이야기하는 데 끼어들어서) 내 말을 들었다.", "eng": "He listened in to me."}, {"id": "1168", "group": "56", "kor": "그는 그 라디오의 주파수를 ABC에 맞추어서 들었다.", "eng": "He tuned his radio in to ABC."}, {"id": "1169", "group": "56", "kor": "그는 그 라디오의 주파수를 ABC에 맞추어서 들었다.", "eng": "He tuned his radio in on ABC."}, {"id": "1170", "group": "57", "kor": "그 유도탄은 범위를 좁혀가면서 표적에 명중했다.", "eng": "The missile zeroed in on the target."}, {"id": "1171", "group": "57", "kor": "나는 그 아기를 들여다보았다. 내 시선이 (방 같은 곳에 들어가", "eng": "I looked in on the baby."}, {"id": "1172", "group": "57", "kor": "그는 시내에 있는 동안 나를 찾아 들어왔다. (즉, 나에게 들렀다)", "eng": "He dropped in on me while he was in the city."}, {"id": "1173", "group": "57", "kor": "그 카메라가 줌을 당겨서 그녀의 얼굴에 초점을 맞췄다.", "eng": "The camera zoomed in on her face."}, {"id": "1174", "group": "57", "kor": "그들은 범위를 좁혀 들어가서 해결책을 찾았다.", "eng": "They narrowed in on the solution."}, {"id": "1175", "group": "58", "kor": "그는 당분간 정규직 교사를 대신해서 가르치고 있다.", "eng": "He is filling in for the regular teacher for the time being."}, {"id": "1176", "group": "58", "kor": "그 새 아나운서가 저녁 뉴스에 나를 대신해서 방송을 하게 되어 있다.", "eng": "The new announcer is going to sit in for me on the evening broadcast."}, {"id": "1177", "group": "58", "kor": "내가 다리를 다쳐 있는 동안 브라이언이 내 대신 경기를 했다.", "eng": "Brian stood in for me while I was suffering from the broken leg."}, {"id": "1178", "group": "59", "kor": "그는 곤란을 받을 상황에 처했다.", "eng": "He's in for trouble."}, {"id": "1179", "group": "59", "kor": "그는 충격을 받을 상황에 처했다.", "eng": "He's in for shock."}, {"id": "1180", "group": "59", "kor": "그는 놀람을 받을 상황에 처했다.", "eng": "He's in for surprise."}, {"id": "1181", "group": "59", "kor": "나는 새로운 아이로 인하여 우리가 어려운 상황에 처해 있음을 알 수 있다.", "eng": "I can see that we are in for a difficult time with the new baby."}, {"id": "1182", "group": "59", "kor": "그 상사는 아침 인사를 거의 하지 않았으므로 나는 내가 곤란한 상황에 처했음을 알 수 있었다.", "eng": "The boss barely said 'good morning', and I could see I was in for trouble."}, {"id": "1183", "group": "59", "kor": "그 팀은 토요일 경기 패배 이후 그들의 매니저에게 한소리를 들었다.", "eng": "The team are in for a bit of tough talking from their manager after Saturday's defeat."}, {"id": "1184", "group": "60", "kor": "기름은 물과 섞이지 않는다.", "eng": "Oil does not blend with water."}, {"id": "1185", "group": "60", "kor": "그 빌딩은 그 주변 풍경과 어울리지 않는다.", "eng": "The building does not blend in with the landscape."}, {"id": "1186", "group": "60", "kor": "우리 회사는 좀 더 큰 회사와 합병했다.", "eng": "Our company merged with a larger company."}, {"id": "1187", "group": "60", "kor": "나는 배경에 섞여 들어가는 민트색을 골랐다.", "eng": "I chose a color mint that would merge in with the background."}, {"id": "1188", "group": "61", "kor": "우리는 그 홀로 들어가서 나머지 손님들과 섞여 들어갔다.", "eng": "We went into the hall and mingled in with the rest of the guests."}, {"id": "1189", "group": "61", "kor": "그 차는 그의 생활양식과 어울리지 않는다.", "eng": "The car does not fit in with his life style."}, {"id": "1190", "group": "61", "kor": "밴드 단원들은 휴식 시간 동안 무대에서 내려와서 청중과 어울렸다.", "eng": "The band came down from the stage and mixed in with the guests during the break."}, {"id": "1191", "group": "61", "kor": "조는 잭과 손을 맞잡고 그 기획사업에 종사했다.", "eng": "Joe joined in with Jack and worked on the project."}, {"id": "1192", "group": "61", "kor": "그 새 건물은 그 주위의 역사적 건물과 조화가 되도록 설계되", "eng": "The new building is designed to tone in with the historical buildings of the area."}, {"id": "1193", "group": "62", "kor": "그 군인들이 그 시로 진군해 들어갔다.", "eng": "The soldiers marched into the city."}, {"id": "1194", "group": "62", "kor": "그 군인들이 그 시로 좀 더 가깝게 진군해 들어갔다.", "eng": "The soldiers marched in closer to the city."}, {"id": "1195", "group": "63", "kor": "그는 유혹에 굴복했다.", "eng": "He gave in to temptation."}, {"id": "1196", "group": "63", "kor": "그는 TV의 축구 경기를 틀어 놓고 있다.", "eng": "He is tuned in to the football on TV."}, {"id": "1197", "group": "63", "kor": "그는 그의 무기를 경찰에 들여보냈다. (즉, 반납했다)", "eng": "He turned his weapon in to the police."}, {"id": "1198", "group": "63", "kor": "관리자들이 잇따라 노동조합의 요구에 굴복했다.", "eng": "The successive managers caved in to the demand of the union."}]}, {"title": "Chapter 17. Inside", "items": [{"id": "1199", "group": "1", "kor": "그 화분은 집 안에 있다.", "eng": "The vase is inside the house."}, {"id": "1200", "group": "1", "kor": "열쇠는 상자 안에 있었다.", "eng": "There was a key inside the box."}, {"id": "1201", "group": "1", "kor": "모든 돈은 금고 안에서 안전하다.", "eng": "All the money is safe inside the safe."}, {"id": "1202", "group": "1", "kor": "모든 잡지 안에는 무료 쿠폰이 있다.", "eng": "There is a free coupon inside every copy of the magazine."}, {"id": "1203", "group": "1", "kor": "그 운전자는 차 안에 갇혀 있다.", "eng": "The driver is trapped inside the car."}, {"id": "1204", "group": "2", "kor": "그의 말은 내 마음속 깊이 경종을 울렸다.", "eng": "His words struck a warning note deep inside me."}, {"id": "1205", "group": "2", "kor": "그녀 머릿속의 웅웅 거리는 소리가 그녀를 몹시 괴롭히고 있다.", "eng": "The ringing noise inside her head is bothering her a lot."}, {"id": "1206", "group": "3", "kor": "그는 100미터를 20초 안에 뛰었다.", "eng": "He ran 100m inside 20 seconds."}, {"id": "1207", "group": "3", "kor": "그 일은 일주일 안에 끝내야 한다.", "eng": "The work should be finished inside a week."}, {"id": "1208", "group": "4", "kor": "우리는 그 성 안으로 들어갔다.", "eng": "We went inside the castle."}, {"id": "1209", "group": "4", "kor": "그는 내 집 안으로 들어왔다.", "eng": "He came inside my house."}, {"id": "1210", "group": "4", "kor": "그 상자 속을 들여다 보세요.", "eng": "Please look inside the box."}, {"id": "1211", "group": "4", "kor": "그 꽃들을 방 안에 가져다 놓아줘.", "eng": "Please put the flowers inside the r"}, {"id": "1212", "group": "5", "kor": "그 화분은 안에 있다.", "eng": "The vase is inside."}, {"id": "1213", "group": "5", "kor": "그 화분을 안쪽에 두어라.", "eng": "Put the vase inside."}, {"id": "1214", "group": "5", "kor": "그 범죄자는 감옥에서 보내는 3년, 징역 3년을 선고받았다.", "eng": "The criminal was sentenced to three years inside."}]}, {"title": "Chapter 18. Into", "items": [{"id": "1215", "group": "1", "kor": "그는 (어디에) 들어갔다.", "eng": "He went in."}, {"id": "1216", "group": "1", "kor": "그는 서재에 들어갔다.", "eng": "He went into the study."}, {"id": "1217", "group": "2", "kor": "그는 그 사무실에 들어갔다.", "eng": "He went into the office."}, {"id": "1218", "group": "2", "kor": "그는 그의 집에 뛰어 들어갔다.", "eng": "He ran into his house."}, {"id": "1219", "group": "3", "kor": "그는 그 집 안으로 들어갔다.", "eng": "He went into the house."}, {"id": "1220", "group": "3", "kor": "팬들이 그 경기장으로 쏟아져 들어갔다.", "eng": "Fans poured into the stadium."}, {"id": "1221", "group": "3", "kor": "그는 내 사무실에 잠깐 들렀다.", "eng": "He dropped into my office."}, {"id": "1222", "group": "3", "kor": "우리는 아파트로 이사해 들어갔다.", "eng": "We moved into an apartment."}, {"id": "1223", "group": "3", "kor": "힘이 내 몸속으로 흘러 들어왔다.", "eng": "Strength flowed into my body."}, {"id": "1224", "group": "3", "kor": "총알들이 그 사자 속으로 뚫고 들어갔다.", "eng": "Bullets tore into the lion."}, {"id": "1225", "group": "4", "kor": "그는 여덟 명의 사람들을 그의 경차 안에 쑤셔 넣었다.", "eng": "He crammed eig e."}, {"id": "2299", "group": "10", "kor": "이 빵은 통밀가루를 사용해서 만든다.", "eng": "This bread is made out of the wholewheat flour."}, {"id": "2300", "group": "10", "kor": "그는 나뭇가지를 이용해서 테이블을 만들었다.", "eng": "He crafted a table out of twigs."}, {"id": "2301", "group": "10", "kor": "제비는 잔가지, 지푸라기, 그리고 진흙을 이용해서 그들의 둥지를 짓는다.", "eng": "Swallows construct their nest out of twigs, straws and clay."}, {"id": "2302", "group": "11", "kor": "열명 중 일곱 명의 젊은이들이 미취업 상태이다.", "eng": "Seven out of ten young people are unemployed."}, {"id": "2303", "group": "11", "kor": "다섯 명 중 네 명의 대학생들이 자원을 했다.", "eng": "Four out of five college students volunteered to help."}, {"id": "2304", "group": "12", "kor": "비를 피해 안으로 들어오세요.", "eng": "Come in out of the rain."}, {"id": "2305", "group": "13", "kor": "그는 마을에서 3마일 떨어진 곳에 산다.", "eng": "He lives three miles out of town."}, {"id": "2306", "group": "13", "kor": "그들은 시계에서 2마일 떨어진 곳에서 멈추었다.", "eng": "They stopped two miles out of the city limit."}]}, {"title": "Chapter 25. Outside", "items": [{"id": "2307", "group": "1", "kor": "그것을 집 밖에 놓아라.", "eng": "Put it outside the house."}, {"id": "2308", "group": "1", "kor": "그 화분은 방 밖에 있다.", "eng": "The vase is outside the room."}, {"id": "2309", "group": "1", "kor": "천안은 서울에서 100km 밖에 있다.", "eng": "Cheonan is about 100km outside Seoul."}, {"id": "2310", "group": "1", "kor": "우리가 탁자를 치울 동안 방 밖으로 나가 있어라.", "eng": "Please step outside the room while we clear away the table."}, {"id": "2311", "group": "2", "kor": "우리의 직계 가족 범위 밖에 있는 누구도 그 비밀에 대해 알지 못한다.", "eng": "Nobody outside our immediate family knows about the secrets."}, {"id": "2312", "group": "2", "kor": "노동조합에 속하지 않은 직원들은 거의 없다.", "eng": "Very few employees remained outside the labor union."}, {"id": "2313", "group": "2", "kor": "그 주제는 그 화제의 범위 밖에 있다.", "eng": "The subject is outside the scope of the topic."}, {"id": "2314", "group": "3", "kor": "근무 시간 이외의 것은 개인 시간이다.", "eng": "Outside office hours, my time is my own."}, {"id": "2315", "group": "3", "kor": "너는 나를 e under mine."}, {"id": "2644", "group": "1", "kor": "그 삽화 밑의 제목을 읽으세요.", "eng": "Read the caption under the illustration."}, {"id": "2645", "group": "1", "kor": "당신의 손을 찬 수돗물 꼭지 밑에 갖다 대세요.", "eng": "Hold your hands under the cold tap."}, {"id": "2646", "group": "1", "kor": "그 동물은 땅 속 깊은 데 집을 가지고 있다.", "eng": "The animal has its home deep under the earth."}, {"id": "2647", "group": "2", "kor": "19세 이하의 사람들은 술집에 갈 수 없다.", "eng": "People under 19 cannot go to bars."}, {"id": "2648", "group": "2", "kor": "그가 병원에 입원했을 때 그는 40킬로그램 이하로 몸무게가 나갔다.", "eng": "He weighed under 40kg when he was admitted to the hospital."}, {"id": "2649", "group": "2", "kor": "그 일은 2시간이 채 안 걸렸다.", "eng": "The work took us under two hours."}, {"id": "2650", "group": "2", "kor": "내가 20달러 이하로 무엇을 살 수 있나요?", "eng": "What can I buy under twenty dollars?"}, {"id": "2651", "group": "3", "kor": "그녀는 그녀의 휘하에 20명의 직원들을 데리고 있다.", "eng": "She has more than 20 employees under her."}, {"id": "2652", "group": "3", "kor": "그 나라는 독일의 지배하에 놓여 있었다.", "eng": "The country was under the German rule."}, {"id": "2653", "group": "3", "kor": "우리는 그 집을 팔아야 하는 압력하에 있다.", "eng": "We are under pressure to sell the house."}, {"id": "2654", "group": "3", "kor": "그 반란군은 공격을 받고 있다.", "eng": "The militants are under attack."}, {"id": "2655", "group": "3", "kor": "규칙의 변화가 논의 중에 있다.", "eng": "A change of rule is under discussion."}, {"id": "2656", "group": "3", "kor": "명령하에", "eng": "under command"}, {"id": "2657", "group": "3", "kor": "고려 중에", "eng": "under consideration"}, {"id": "2658", "group": "3", "kor": "통제하에", "eng": "under control"}, {"id": "2659", "group": "3", "kor": "개발 중에", "eng": "under development"}, {"id": "2660", "group": "3", "kor": "비난하에", "eng": "under fire"}, {"id": "2661", "group": "3", "kor": "지도하에", "eng": "under leadership"}, {"id": "2662", "group": "3", "kor": "격리 중에", "eng": "under quarantine"}, {"id": "2663", "group": "3", "kor": "점령하에", "eng": "under seizure"}, {"id": "2664", "group": "3", "kor": "조사 중에 ", "group": "7", "kor": "그는 그 커버를 들추고 그 밑을 기어갔다.", "eng": "He pulled up the cover and crawled under."}, {"id": "2685", "group": "7", "kor": "그는 의식을 잃어간다고 느꼈다.", "eng": "He felt himself going under."}]}, {"title": "Chapter 31. Until", "items": [{"id": "2686", "group": "1", "kor": "그는 지난주까지 아팠다.", "eng": "He was sick until last week."}, {"id": "2687", "group": "1", "kor": "그녀는 그 부자 남자와 결혼하기 전까지 가난했다.", "eng": "She was poor until her marriage to the rich man."}, {"id": "2688", "group": "2", "kor": "우리는 다음 주까지 한국에 머무를 것이다.", "eng": "We are staying in Korea until next week."}, {"id": "2689", "group": "2", "kor": "그는 지난 밤 늦게까지 일했다.", "eng": "He worked until late last night."}, {"id": "2690", "group": "2", "kor": "그 파티는 자정 훨씬 넘어서까지 계속되었다.", "eng": "The party went on until well after the midnight."}, {"id": "2691", "group": "3", "kor": "12월까지는 휴일이 없을 것이다.", "eng": "There will be no holiday until December."}, {"id": "2692", "group": "3", "kor": "그는 몇 년 전 유학을 갔고 2019년까지 돌아오지 않았다.", "eng": "He went abroad to study few years ago, and did not return until 2019."}, {"id": "2693", "group": "3", "kor": "남편이 돌아가기 전까지 그녀는 자신이 얼마나 행복했는지 알지 못했다. (즉, 남편이 돌아가고 난 후에 깨달았다.)", "eng": "Not until her husband's death, did she realize how happy she was."}, {"id": "2694", "group": "3", "kor": "그녀는 오전 11시까지 아래층으로 내려오지 않았다.", "eng": "She did not come downstairs until 11 am."}, {"id": "2695", "group": "4", "kor": "시험까지 딱 한 달이었다. (즉, 한 달이 남아 있었다.)", "eng": "It was only one month until the exam."}, {"id": "2696", "group": "4", "kor": "출발까지 겨우 1시간이 있다. (즉, 1시간이 남아 있다.)", "eng": "There is barely one hour until the departure."}]}, {"title": "Chapter 32. Up", "items": [{"id": "2697", "group": "1", "kor": "그는 그 산을 올라갔다.", "eng": "He walked up the hill."}, {"id": "2698", "group": "1", "kor": "그 원숭이가 그 나무를 기어 올라갔다.", "eng": "The monkey climbed up the tree."}, {"id": "2699", "group": "1", "kor": "그 아이가 그 계단을 올라갔다.", "eng": "The child ran up the stairs."}, {"id": "2700", "group": "2", "kor": "그는 양동이를 그 사다리 위로 const STORAGE_KEY = 'phrasal_prep_known_v1';
function loadKnown(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}
function saveKnown(obj){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }catch(e){} }
let known = loadKnown();

const TOTAL_ITEMS = CHAPTERS.reduce((sum, c) => sum + c.items.length, 0);

// ===== 음성 선택 =====
let preferredVoice = null;
function pickBestVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;
  const enVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  const pool = enVoices.length ? enVoices : voices;
  const priorityNames = ['Aria','Jenny','Ava','Google US English','Andrew','Guy','Samantha'];
  for(const name of priorityNames){
    const found = pool.find(v => v.name.includes(name));
    if(found){ preferredVoice = found; return; }
  }
  const remoteUS = pool.find(v => v.lang === 'en-US' && !v.localService);
  if(remoteUS){ preferredVoice = remoteUS; return; }
  const anyUS = pool.find(v => v.lang === 'en-US');
  preferredVoice = anyUS || pool[0];
}
if('speechSynthesis' in window){
  pickBestVoice();
  speechSynthesis.onvoiceschanged = pickBestVoice;
}
function speakText(text){
  if(!('speechSynthesis' in window) || !text) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if(preferredVoice) u.voice = preferredVoice;
  u.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== Navigation =====
const screens = {
  home: document.getElementById('screen-home'),
  flash: document.getElementById('screen-flash'),
  list: document.getElementById('screen-list'),
  quiz: document.getElementById('screen-quiz'),
};
const navBtns = document.querySelectorAll('.nav-btn');
function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  navBtns.forEach(b=>b.classList.toggle('active', b.dataset.screen===name));
  screens[name].classList.add('active');
  if(name==='home') renderHome();
}
navBtns.forEach(b=>b.addEventListener('click', ()=>{
  if(b.dataset.screen==='flash' && !currentChapter){ alert('먼저 홈에서 챕터를 선택해주세요.'); showScreen('home'); return; }
  if(b.dataset.screen==='list' && !currentChapter){ currentChapter = CHAPTERS[0]; }
  if(b.dataset.screen==='quiz' && !currentChapter){ currentChapter = CHAPTERS[0]; }
  if(b.dataset.screen==='list') renderList();
  if(b.dataset.screen==='quiz') startQuiz();
  showScreen(b.dataset.screen);
}));
document.getElementById('flash-back').onclick = ()=>showScreen('home');
document.getElementById('list-back').onclick = ()=>showScreen('home');
document.getElementById('quiz-back').onclick = ()=>showScreen('home');

// ===== Home =====
function renderHome(){
  const totalKnown = Object.keys(known).filter(k=>known[k]).length;
  document.getElementById('stat-known').textContent = totalKnown;
  document.getElementById('stat-total').textContent = TOTAL_ITEMS;
  document.getElementById('stat-pct').textContent = Math.round(totalKnown/TOTAL_ITEMS*100)+'%';

  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  CHAPTERS.forEach((c)=>{
    const gk = c.items.filter(it=>known[it.id]).length;
    const div = document.createElement('div');
    div.className = 'chapter-btn';
    div.innerHTML = `<div><div class="name">${c.title}</div><div class="meta">${c.items.length}개 문장</div></div><div class="pct">${gk}/${c.items.length}</div>`;
    div.onclick = ()=>{
      currentChapter = c;
      startFlash();
      showScreen('flash');
    };
    list.appendChild(div);
  });
}

// ===== Flash mode =====
let currentChapter = null;
let flashPos = 0;
let flashTimer = null;
let flashOrder = [];

function startFlash(){
  flashOrder = [...currentChapter.items];
  flashPos = 0;
  showFlashCard();
}
function updateNavButtons(){
  document.getElementById('flash-prev').disabled = flashPos <= 0;
  document.getElementById('flash-next').disabled = flashPos >= flashOrder.length - 1;
}
function showFlashCard(){
  clearTimeout(flashTimer);
  if(flashPos >= flashOrder.length){
    document.getElementById('flash-eng').textContent = '완료! 🎉';
    document.getElementById('flash-kor').textContent = '홈으로 돌아가 다른 챕터를 선택하세요';
    document.getElementById('flash-kor').classList.add('show');
    document.getElementById('flash-progress').textContent = `${flashOrder.length} / ${flashOrder.length}`;
    document.getElementById('flash-prev').disabled = false;
    document.getElementById('flash-next').disabled = true;
    return;
  }
  updateNavButtons();
  const item = flashOrder[flashPos];
  document.getElementById('flash-progress').textContent = `${flashPos+1} / ${flashOrder.length}`;
  document.getElementById('flash-eng').textContent = item.eng;
  const korEl = document.getElementById('flash-kor');
  korEl.textContent = item.kor;
  korEl.classList.remove('show');
  speakText(item.eng);

  const speed = parseInt(document.getElementById('speed-select').value, 10);
  if(speed > 0){
    flashTimer = setTimeout(()=>{ korEl.classList.add('show'); }, speed);
  }
}
document.getElementById('flash-card').addEventListener('click', ()=>{
  document.getElementById('flash-kor').classList.add('show');
});
document.getElementById('flash-speak').onclick = ()=>{
  const item = flashOrder[flashPos];
  if(item) speakText(item.eng);
};
document.getElementById('flash-prev').onclick = ()=>{
  if(flashPos > 0){ flashPos--; showFlashCard(); }
};
document.getElementById('flash-next').onclick = ()=>{
  if(flashPos < flashOrder.length - 1){ flashPos++; showFlashCard(); }
};
function nextFlash(markKnown){
  const item = flashOrder[flashPos];
  if(item){ known[item.id] = markKnown; saveKnown(known); }
  flashPos++;
  showFlashCard();
}
document.getElementById('flash-know').onclick = ()=>nextFlash(true);
document.getElementById('flash-unknow').onclick = ()=>nextFlash(false);

// ===== List mode =====
function renderList(){
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  if(!currentChapter){ container.innerHTML = '<div class="empty">홈에서 챕터를 선택해주세요</div>'; return; }
  currentChapter.items.forEach(item=>{
    const div = document.createElement('div');
    const status = known[item.id];
    let statusClass = '', icon = '';
    if(status === true){ statusClass='status-known'; icon='✓'; }
    else if(status === false){ statusClass='status-unknown'; icon='✕'; }
    div.className = 'list-item' + (statusClass ? ' '+statusClass : '');
    div.innerHTML = `<div class="list-item-top"><span class="list-status-icon">${icon}</span><span class="list-eng">${item.eng}</span></div><div class="list-kor">${item.kor}</div>`;
    div.onclick = ()=> speakText(item.eng);
    container.appendChild(div);
  });
}

// ===== 복습(Quiz) mode =====
let quizOrder = [];
let quizPos = 0;

function startQuiz(){
  if(!currentChapter){ currentChapter = CHAPTERS[0]; }
  quizOrder = [...currentChapter.items]; // 챕터 순서 그대로, 전체 문장
  quizPos = 0;
  showQuizCard();
}
function updateQuizNavButtons(){
  document.getElementById('quiz-prev').disabled = quizPos <= 0;
  document.getElementById('quiz-next').disabled = quizPos >= quizOrder.length - 1;
}
function showQuizCard(){
  if(quizPos >= quizOrder.length){
    document.getElementById('quiz-kor').textContent = '완료! 🎉';
    document.getElementById('quiz-eng-answer').textContent = '홈으로 돌아가 다른 챕터를 선택하세요';
    document.getElementById('quiz-eng-answer').classList.add('show');
    document.getElementById('quiz-hint').textContent = '';
    document.getElementById('quiz-status').textContent = `${quizOrder.length} / ${quizOrder.length}`;
    document.getElementById('quiz-prev').disabled = false;
    document.getElementById('quiz-next').disabled = true;
    return;
  }
  updateQuizNavButtons();
  const item = quizOrder[quizPos];
  document.getElementById('quiz-status').textContent = `${quizPos+1} / ${quizOrder.length}`;
  document.getElementById('quiz-kor').textContent = item.kor;
  const ansEl = document.getElementById('quiz-eng-answer');
  ansEl.textContent = item.eng;
  ansEl.classList.remove('show');
  document.getElementById('quiz-hint').textContent = '탭해서 정답 확인';
}
function revealQuizAnswer(){
  const item = quizOrder[quizPos];
  if(!item) return;
  const ansEl = document.getElementById('quiz-eng-answer');
  if(!ansEl.classList.contains('show')){
    ansEl.classList.add('show');
    document.getElementById('quiz-hint').textContent = '';
    speakText(item.eng);
  }
}
document.getElementById('quiz-card').addEventListener('click', revealQuizAnswer);
document.getElementById('quiz-speak').onclick = ()=>{
  const item = quizOrder[quizPos];
  if(item) speakText(item.eng);
};
document.getElementById('quiz-prev').onclick = ()=>{
  if(quizPos > 0){ quizPos--; showQuizCard(); }
};
document.getElementById('quiz-next').onclick = ()=>{
  if(quizPos < quizOrder.length - 1){ quizPos++; showQuizCard(); }
};
function nextQuiz(passed){
  const item = quizOrder[quizPos];
  if(item){ known[item.id] = passed; saveKnown(known); }
  quizPos++;
  showQuizCard();
}
document.getElementById('quiz-pass').onclick = ()=>nextQuiz(true);
document.getElementById('quiz-retry').onclick = ()=>nextQuiz(false);

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

renderHome();
</script>
